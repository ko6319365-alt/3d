<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Love</title>
    <style>
        :root {
            --primary-pink: #ff7597;
            --dark-pink: #e05275;
            --bg-gradient: linear-gradient(135deg, #111 0%, #000 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- Lock Screen --- */
        #lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffeef2 0%, #ffd1dc 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .lock-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(224, 82, 117, 0.2);
            text-align: center;
            max-width: 360px;
            width: 90%;
        }

        .lock-container h2 {
            color: var(--dark-pink);
            margin-bottom: 1.5rem;
        }

        .lock-container input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--primary-pink);
            border-radius: 25px;
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            outline: none;
        }

        .lock-container button {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .error-msg {
            color: #d9534f;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            display: none;
        }

        /* --- Main Content Space --- */
        #main-content {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
            width: 100vw;
            height: 100vh;
            position: relative;
            background: var(--bg-gradient);
        }

        /* --- Glowing Text --- */
        .glowing-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-family: 'Georgia', serif;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,117,151,0.8), 0 0 20px rgba(255,117,151,0.5);
            pointer-events: none;
            z-index: 10;
        }

        .text-top { top: 6%; font-size: 1.8rem; animation: pulse 2s infinite alternate; }
        .text-bottom { bottom: 6%; font-size: 1.3rem; color: var(--primary-pink); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* --- Heart Gallery Container --- */
        .heart-gallery {
            position: absolute;
            top: 48%;
            left: 50%;
            width: 320px;
            height: 320px;
            transform: translate(-50%, -50%);
        }

        /* --- Photo Styles & Falling Animation --- */
        .photo-node {
            position: absolute;
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(255, 117, 151, 0.4);
            opacity: 0;
            /* မျက်နှာပြင်အပေါ်ကနေ တစ်ပုံချင်းစီ သက်မှတ်ထားတဲ့ အသည်းပုံနေရာကို ကျလာမယ့် Animation */
            animation: fallToHeart 2.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fallToHeart {
            0% {
                top: -600px; /* မျက်နှာပြင်ရဲ့ အပေါ်ဆုံး အပြင်ကနေ စကျမည် */
                left: calc(50% - 30px);
                transform: scale(0.5) rotate(720deg);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            100% {
                /* JavaScript ကနေ လှမ်းတွက်ပေးမယ့် Target နေရာတွေဆီ ရောက်သွားမည် */
                top: var(--target-y);
                left: var(--target-x);
                transform: scale(1) rotate(var(--target-rot));
                opacity: 1;
            }
        }

        /* --- Background Floating Hearts --- */
        #heart-bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .bg-heart {
            position: absolute;
            bottom: -30px;
            color: rgba(255, 117, 151, 0.4);
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .heart-gallery { width: 260px; height: 260px; }
            .photo-node { width: 48px; height: 48px; }
            .text-top { font-size: 1.4rem; }
            .text-bottom { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <audio id="mySong" src="music.mp3" loop></audio>

    <div id="lock-screen">
        <div class="lock-container">
            <h2>Our Secret Key 💖</h2>
            <p style="margin-bottom: 1rem; color: #777; font-size: 0.9rem;">Enter password to see magic</p>
            <input type="text" id="password-input" placeholder="Password..." onkeypress="handleKeyPress(event)">
            <button onclick="checkPassword()">Unlock Memories</button>
            <div class="error-msg" id="error-message">Oops! Try again love.</div>
        </div>
    </div>

    <div id="main-content">
        <div id="heart-bg-container"></div>

        <div class="glowing-text text-top">I love you so much 💖</div>

        <div class="heart-gallery" id="photo-area"></div>

        <div class="glowing-text text-bottom">You are my whole world... ✨</div>
    </div>

    <script>
        const CORRECT_PASSWORD = "1.5.2022";

        // ဓာတ်ပုံ ၂၀ ကို အသည်းပုံသဏ္ဌာန်ဖြစ်အောင် (X, Y) နေရာ တိကျစွာ တွက်ချက်ထားသော Matrix (Percentage ဖြင့်)
        const heartCoordinates = [
            {x: 50, y: 25, r: 0},   // ထိပ်အလယ်ဆုံမှတ်
            {x: 65, y: 15, r: 10},  {x: 35, y: 15, r: -10},
            {x: 80, y: 15, r: 20},  {x: 20, y: 15, r: -20},
            {x: 93, y: 25, r: 35},  {x: 7,  y: 25, r: -35},
            {x: 96, y: 42, r: 20},  {x: 4,  y: 42, r: -20},
            {x: 90, y: 58, r: -10}, {x: 10, y: 58, r: 10},
            {x: 78, y: 72, r: -25}, {x: 22, y: 72, r: 25},
            {x: 64, y: 84, r: -40}, {x: 36, y: 84, r: 40},
            {x: 50, y: 95, r: 0},   // အောက်ခြေချွန်မှတ်
            // အတွင်းပိုင်း အသည်းပုံထပ်ဖြည့်ချက်များ
            {x: 50, y: 48, r: 5},   {x: 35, y: 42, r: -15},
            {x: 65, y: 42, r: 15},  {x: 50, y: 70, r: -5}
        ];

        function handleKeyPress(e) {
            if (e.key === 'Enter') checkPassword();
        }

        function checkPassword() {
            const input = document.getElementById('password-input').value.trim();
            const error = document.getElementById('error-message');
            const lockScreen = document.getElementById('lock-screen');
            const mainContent = document.getElementById('main-content');

            if (input === CORRECT_PASSWORD) {
                // Play Song
                const audio = document.getElementById('mySong');
                if(audio) {
                    audio.play().catch(err => console.log("Audio play blocked", err));
                }

                lockScreen.style.opacity = '0';
                setTimeout(() => {
                    lockScreen.style.display = 'none';
                    mainContent.style.display = 'block';
                    setTimeout(() => {
                        mainContent.style.opacity = '1';
                        // ဓာတ်ပုံများ တစ်ပုံပြီးတစ်ပုံ ကျလာစေရန် စတင်ခေါ်ယူခြင်း
                        generateFallingPhotos();
                        // နောက်ခံ အသည်းပုံအသေးလေးများ ပျံတက်စေရန်
                        setInterval(createBgHeart, 400);
                    }, 50);
                }, 800);
            } else {
                error.style.display = 'block';
            }
        }

        function generateFallingPhotos() {
            const area = document.getElementById('photo-area');
            
            // ပုံ ၂၀ ကို တစ်ပုံချင်းစီ Delay (အချိန်ခြားပြီး) ကျလာအောင် လုပ်ခြင်း
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = `${i + 1}.jpg`; // 1.jpg မှ 20.jpg အထိ ပုံများကို ခေါ်မည်
                    img.classList.add('photo-node');
                    
                    // CSS Variables ထဲသို့ ကျရမည့် Target (X, Y) နေရာများ ထည့်ပေးခြင်း
                    const coord = heartCoordinates[i];
                    img.style.setProperty('--target-x', `calc(${coord.x}% - 30px)`);
                    img.style.setProperty('--target-y', `calc(${coord.y}% - 30px)`);
                    img.style.setProperty('--target-rot', `${coord.r}deg`);
                    
                    area.appendChild(img);
                }, i * 350); // တစ်ပုံနှင့်တစ်ပုံ ၀.၃၅ စက္ကန့်စီ ခြားပြီး ကျလာမည်
            }
        }

        function createBgHeart() {
            const container = document.getElementById('heart-bg-container');
            if(!container) return;
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            const items = ['❤️', '💖', '💕', '🌸'];
            heart.innerText = items[Math.floor(Math.random() * items.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.fontSize = (Math.random() * 1 + 0.8) + 'rem';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
    </script>
</body>
</html>
